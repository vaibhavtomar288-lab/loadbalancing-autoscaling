<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" width="900" height="700">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#11998e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38ef7d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ee0979;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6a00;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="700" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="450" y="35" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#333" text-anchor="middle">AWS Auto Scaling with Application Load Balancer</text>
  <text x="450" y="55" font-family="Arial, sans-serif" font-size="14" fill="#666" text-anchor="middle">Architecture Diagram - us-east-1 Region</text>
  
  <!-- Internet Users -->
  <g transform="translate(350, 80)">
    <ellipse cx="100" cy="30" rx="80" ry="25" fill="url(#grad1)" filter="url(#shadow)"/>
    <text x="100" y="35" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle">Internet Users</text>
  </g>
  
  <!-- Arrow down -->
  <line x1="450" y1="105" x2="450" y2="130" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <polygon points="450,135 445,125 455,125" fill="#333"/>
  
  <!-- Application Load Balancer -->
  <g transform="translate(300, 140)">
    <rect x="0" y="0" width="300" height="60" rx="8" fill="url(#grad2)" filter="url(#shadow)"/>
    <text x="150" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">Application Load Balancer (ALB)</text>
    <text x="150" y="45" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">project-alb-xxx.elb.amazonaws.com</text>
  </g>
  
  <!-- Arrow down -->
  <line x1="450" y1="200" x2="450" y2="225" stroke="#333" stroke-width="2"/>
  <polygon points="450,230 445,220 455,220" fill="#333"/>
  
  <!-- Target Group -->
  <g transform="translate(320, 235)">
    <rect x="0" y="0" width="260" height="50" rx="6" fill="#4a90d9" filter="url(#shadow)"/>
    <text x="130" y="20" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Target Group</text>
    <text x="130" y="38" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">HTTP:80 | Health Check Enabled</text>
  </g>
  
  <!-- Arrow down -->
  <line x1="450" y1="285" x2="450" y2="310" stroke="#333" stroke-width="2"/>
  <polygon points="450,315 445,305 455,305" fill="#333"/>
  
  <!-- Auto Scaling Group Box -->
  <rect x="50" y="320" width="800" height="180" rx="10" fill="white" stroke="#ddd" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="450" y="345" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">Auto Scaling Group: projectautoscaling</text>
  <text x="450" y="362" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">Desired: 2 | Min: 1 | Max: 2</text>
  
  <!-- EC2 Instances -->
  <!-- Instance 1 -->
  <g transform="translate(80, 380)">
    <rect x="0" y="0" width="180" height="100" rx="8" fill="url(#grad3)" filter="url(#shadow)"/>
    <text x="90" y="25" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">EC2 Instance</text>
    <text x="90" y="45" font-family="Courier, monospace" font-size="11" fill="white" text-anchor="middle">i-0abc123...</text>
    <text x="90" y="62" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">t3.micro</text>
    <text x="90" y="78" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">AZ: us-east-1a</text>
    <text x="90" y="92" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle">Apache + Web App</text>
  </g>
  
  <!-- Instance 2 -->
  <g transform="translate(360, 380)">
    <rect x="0" y="0" width="180" height="100" rx="8" fill="url(#grad3)" filter="url(#shadow)"/>
    <text x="90" y="25" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">EC2 Instance</text>
    <text x="90" y="45" font-family="Courier, monospace" font-size="11" fill="white" text-anchor="middle">i-0def456...</text>
    <text x="90" y="62" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">t3.micro</text>
    <text x="90" y="78" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">AZ: us-east-1b</text>
    <text x="90" y="92" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle">Apache + Web App</text>
  </g>
  
  <!-- Instance 3 (dotted - potential) -->
  <g transform="translate(640, 380)">
    <rect x="0" y="0" width="180" height="100" rx="8" fill="none" stroke="#ff6a00" stroke-width="2" stroke-dasharray="5,5"/>
    <text x="90" y="25" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ff6a00" text-anchor="middle">EC2 Instance</text>
    <text x="90" y="45" font-family="Courier, monospace" font-size="11" fill="#ff6a00" text-anchor="middle">i-0ghi789...</text>
    <text x="90" y="62" font-family="Arial, sans-serif" font-size="10" fill="#ff6a00" text-anchor="middle">t3.micro</text>
    <text x="90" y="78" font-family="Arial, sans-serif" font-size="10" fill="#ff6a00" text-anchor="middle">AZ: us-east-1c</text>
    <text x="90" y="92" font-family="Arial, sans-serif" font-size="9" fill="#ff6a00" text-anchor="middle">(Auto-scaled)</text>
  </g>
  
  <!-- Arrows from Target Group to Instances -->
  <line x1="380" y1="285" x2="170" y2="380" stroke="#4a90d9" stroke-width="2" stroke-dasharray="4,4"/>
  <line x1="450" y1="285" x2="450" y2="380" stroke="#4a90d9" stroke-width="2" stroke-dasharray="4,4"/>
  <line x1="520" y1="285" x2="730" y2="380" stroke="#4a90d9" stroke-width="2" stroke-dasharray="4,4"/>
  
  <!-- CloudWatch Section -->
  <g transform="translate(320, 520)">
    <rect x="0" y="0" width="260" height="70" rx="8" fill="#ff9500" filter="url(#shadow)"/>
    <text x="130" y="25" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">CloudWatch Alarm</text>
    <text x="130" y="45" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">CPUUtilization > 50%</text>
    <text x="130" y="60" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">Triggers Scale-Out Policy</text>
  </g>
  
  <!-- Arrow from ASG to CloudWatch -->
  <line x1="450" y1="500" x2="450" y2="520" stroke="#ff9500" stroke-width="2"/>
  <polygon points="450,525 445,515 455,515" fill="#ff9500"/>
  
  <!-- Arrow from CloudWatch to ASG (feedback loop) -->
  <path d="M 580 555 Q 700 555 700 460 Q 700 380 520 380" stroke="#ff9500" stroke-width="2" fill="none" stroke-dasharray="4,4"/>
  <polygon points="515,375 525,385 515,395" fill="#ff9500"/>
  
  <!-- Legend -->
  <g transform="translate(50, 610)">
    <rect x="0" y="0" width="800" height="60" rx="5" fill="white" stroke="#ddd"/>
    <text x="400" y="20" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333" text-anchor="middle">Legend</text>
    
    <circle cx="100" cy="40" r="6" fill="url(#grad1)"/>
    <text x="115" y="44" font-family="Arial, sans-serif" font-size="10" fill="#333">User Traffic</text>
    
    <circle cx="220" cy="40" r="6" fill="url(#grad2)"/>
    <text x="235" y="44" font-family="Arial, sans-serif" font-size="10" fill="#333">Load Balancer</text>
    
    <circle cx="360" cy="40" r="6" fill="url(#grad3)"/>
    <text x="375" y="44" font-family="Arial, sans-serif" font-size="10" fill="#333">EC2 Instance</text>
    
    <circle cx="500" cy="40" r="6" fill="#ff9500"/>
    <text x="515" y="44" font-family="Arial, sans-serif" font-size="10" fill="#333">CloudWatch</text>
    
    <circle cx="650" cy="40" r="6" fill="#4a90d9"/>
    <text x="665" y="44" font-family="Arial, sans-serif" font-size="10" fill="#333">Health Check</text>
  </g>
  
  <!-- Footer -->
  <text x="450" y="690" font-family="Arial, sans-serif" font-size="10" fill="#999" text-anchor="middle">Region: us-east-1 | Instance Type: t3.micro | Created for AWS Auto Scaling Demo</text>
</svg>